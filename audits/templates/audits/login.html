<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AuditShield — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #0a0e1a;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'DM Sans', sans-serif;
      position: relative;
      overflow: hidden;
    }

    /* Dot grid overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle, rgba(255,255,255,0.06) 1px, transparent 1px);
      background-size: 32px 32px;
      pointer-events: none;
      z-index: 0;
    }

    /* Central teal glow orb */
    .glow-orb-center {
      position: fixed;
      width: 700px;
      height: 700px;
      border-radius: 50%;
      background: radial-gradient(circle,
        rgba(0,229,200,0.14) 0%,
        rgba(0,180,216,0.06) 40%,
        transparent 70%
      );
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 0;
      animation: orb-pulse 4s ease-in-out infinite;
    }

    @keyframes orb-pulse {
      0%, 100% { opacity: 0.7; transform: translate(-50%, -50%) scale(1); }
      50%       { opacity: 1;   transform: translate(-50%, -50%) scale(1.05); }
    }

    /* Blue glow top-right */
    .glow-orb-blue {
      position: fixed;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(59,130,246,0.1) 0%, transparent 70%);
      top: -100px;
      right: -100px;
      pointer-events: none;
      z-index: 0;
      filter: blur(40px);
    }

    /* Purple glow bottom-left */
    .glow-orb-purple {
      position: fixed;
      width: 350px;
      height: 350px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(124,58,237,0.08) 0%, transparent 70%);
      bottom: -80px;
      left: -80px;
      pointer-events: none;
      z-index: 0;
      filter: blur(40px);
    }

    /* ── Login Card ── */
    .login-card {
      position: relative;
      z-index: 1;
      background: rgba(13,18,32,0.95);
      border: 1px solid rgba(0,229,200,0.15);
      border-top: 2px solid rgba(0,229,200,0.4);
      border-radius: 20px;
      padding: 48px 44px;
      width: 100%;
      max-width: 420px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: 0 0 60px rgba(0,229,200,0.08), 0 25px 80px rgba(0,0,0,0.5);
      animation: card-enter 0.5s cubic-bezier(0.4,0,0.2,1) both;
    }

    @keyframes card-enter {
      from { opacity: 0; transform: translateY(24px) scale(0.98); }
      to   { opacity: 1; transform: translateY(0)   scale(1); }
    }

    /* ── Brand ── */
    .brand-wrap {
      text-align: center;
      margin-bottom: 32px;
    }

    .shield-icon-wrap {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: linear-gradient(135deg, #00e5c8 0%, #00b4d8 100%);
      margin-bottom: 16px;
      box-shadow: 0 0 30px rgba(0,229,200,0.35);
    }

    .shield-icon-wrap i {
      font-size: 26px;
      color: #ffffff;
    }

    .shield-ring-anim {
      position: absolute;
      inset: -6px;
      border-radius: 50%;
      border: 1.5px solid transparent;
      border-top-color: rgba(0,229,200,0.6);
      border-right-color: rgba(0,229,200,0.2);
      animation: ring-spin 3s linear infinite;
    }

    @keyframes ring-spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    .brand-name {
      font-family: 'Syne', sans-serif;
      font-size: 30px;
      font-weight: 800;
      color: #ffffff;
      text-shadow: 0 0 30px rgba(0,229,200,0.3);
      margin-bottom: 6px;
      line-height: 1.1;
    }

    .brand-tagline {
      font-size: 13px;
      color: rgba(200,210,240,0.5);
    }

    /* ── Form fields ── */
    .field-group {
      margin-bottom: 20px;
    }

    .field-label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: rgba(200,210,240,0.7);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 8px;
    }

    .field-input {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1.5px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      color: #ffffff;
      padding: 13px 16px;
      font-size: 14px;
      font-family: 'DM Sans', sans-serif;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }

    .field-input::placeholder {
      color: rgba(200,210,240,0.3);
    }

    .field-input:focus {
      border-color: rgba(0,229,200,0.5);
      box-shadow: 0 0 0 3px rgba(0,229,200,0.1);
    }

    /* ── Sign In Button ── */
    .btn-signin {
      width: 100%;
      background: linear-gradient(135deg, #00e5c8 0%, #00b4d8 100%);
      color: #0a0e1a;
      font-weight: 700;
      font-size: 15px;
      font-family: 'DM Sans', sans-serif;
      border: none;
      border-radius: 10px;
      padding: 14px;
      cursor: pointer;
      box-shadow: 0 0 25px rgba(0,229,200,0.3);
      transition: transform 0.2s, box-shadow 0.2s;
      margin-top: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-signin:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 40px rgba(0,229,200,0.5);
    }

    .btn-signin:active {
      transform: translateY(0);
    }

    /* ── Error message ── */
    .error-msg {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 8px;
      padding: 10px 14px;
      color: #fca5a5;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 20px;
    }

    /* ── Footer ── */
    .login-footer {
      text-align: center;
      margin-top: 24px;
      color: rgba(200,210,240,0.25);
      font-size: 12px;
    }
  </style>
</head>
<body>

  <!-- Background glow elements -->
  <div class="glow-orb-center"></div>
  <div class="glow-orb-blue"></div>
  <div class="glow-orb-purple"></div>

  <div class="login-card">

    <!-- Brand -->
    <div class="brand-wrap">
      <div class="shield-icon-wrap">
        <i class="bi bi-shield-check"></i>
        <div class="shield-ring-anim"></div>
      </div>
      <div class="brand-name">AuditShield</div>
      <div class="brand-tagline">Internal IT Audit Management System</div>
    </div>

    <!-- Error messages -->
    {% if messages %}
      {% for message in messages %}
        <div class="error-msg">
          <i class="bi bi-exclamation-triangle-fill"></i>
          <span>{{ message }}</span>
        </div>
      {% endfor %}
    {% endif %}

    <!-- Login Form -->
    <form method="post" action="">
      {% csrf_token %}

      <div class="field-group">
        <label class="field-label" for="id_username">Username</label>
        <input
          class="field-input"
          type="text"
          id="id_username"
          name="username"
          placeholder="Enter your username"
          autocomplete="username"
          autofocus
          required
        >
      </div>

      <div class="field-group">
        <label class="field-label" for="id_password">Password</label>
        <input
          class="field-input"
          type="password"
          id="id_password"
          name="password"
          placeholder="Enter your password"
          autocomplete="current-password"
          required
        >
      </div>

      <button type="submit" class="btn-signin">
        <i class="bi bi-box-arrow-in-right"></i>
        Sign In
      </button>
    </form>

    <p class="login-footer">
      <i class="bi bi-lock-fill" style="margin-right:5px;"></i>Authorized personnel only
    </p>
  </div>

</body>
</html>
